<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Data Rencana Pembelajaran</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom warna khusus agar mirip dengan tema gambar (Hijau - Emas) */
        :root {
            --primary-green: #3B7A57;
            --dark-green: #2D5A3F;
            --gold-accent: #C5A059;
            --bg-cream: #FFFDF9;
        }
        body {
            background-color: var(--bg-cream);
            color: #333;
        }
        .border-gold { border-color: var(--gold-accent); }
        .text-gold { color: var(--gold-accent); }
        .bg-green-main { background-color: var(--primary-green); }
        .bg-green-main:hover { background-color: var(--dark-green); }
        
        /* Style untuk tombol pilhan dimensi yang bisa di-toggle */
        .dimensi-btn.active {
            background-color: var(--gold-accent);
            color: white;
            border-color: var(--gold-accent);
        }

        /* Sembunyikan hasil cetak saat di layar biasa */
        #outputArea { display: none; }

        /* Pengaturan cetak otomatis */
        @media print {
            body * { visibility: hidden; }
            #outputArea, #outputArea * { visibility: visible; }
            #outputArea { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="formContainer" class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow-md border border-amber-100 no-print">
        <p class="text-xs uppercase tracking-wider text-gray-400 font-semibold mb-1">Formulir Isian</p>
        <h1 class="text-2xl font-serif font-bold text-gray-800 mb-6 border-b pb-4">Data Rencana Pembelajaran</h1>

        <form id="rmpForm" onsubmit="generateRMP(event)">
            
            <h2 class="text-lg font-semibold text-emerald-800 mb-4">A. Identitas</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nama Satuan Pendidikan <span class="text-red-500">*</span></label>
                    <input type="text" id="satuanPendidikan" required placeholder="contoh: SMP Negeri 1 Yogyakarta" class="w-full p-2 border border-gold rounded focus:outline-none focus:ring-1 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Mata Pelajaran <span class="text-red-500">*</span></label>
                    <input type="text" id="mataPelajaran" required placeholder="contoh: Ilmu Pengetahuan Alam" class="w-full p-2 border border-gold rounded focus:outline-none focus:ring-1 focus:ring-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Jenjang Pendidikan <span class="text-red-500">*</span></label>
                    <select id="jenjang" required class="w-full p-2 border border-gold rounded bg-white focus:outline-none">
                        <option value="">Pilih Jenjang</option>
                        <option value="SD">SD / MI</option>
                        <option value="SMP">SMP / MTs</option>
                        <option value="SMA">SMA / MA / SMK</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Kelas <span class="text-red-500">*</span></label>
                    <input type="text" id="kelas" required placeholder="contoh: VII, VIII, IX" class="w-full p-2 border border-gold rounded focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Semester <span class="text-red-500">*</span></label>
                    <select id="semester" required class="w-full p-2 border border-gold rounded bg-white focus:outline-none">
                        <option value="">Pilih semester</option>
                        <option value="Ganjil">Ganjil</option>
                        <option value="Genap">Genap</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Tahun Ajaran <span class="text-red-500">*</span></label>
                    <input type="text" id="tahunAjaran" required placeholder="contoh: 2025/2026" class="w-full p-2 border border-gold rounded focus:outline-none">
                </div>
            </div>

            <h2 class="text-lg font-semibold text-emerald-800 mb-4">B. Identitas Penanggung Jawab</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nama Guru <span class="text-red-500">*</span></label>
                    <input type="text" id="namaGuru" required class="w-full p-2 border border-gold rounded focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">NIP Guru <span class="text-red-500">*</span></label>
                    <input type="text" id="nipGuru" required class="w-full p-2 border border-gold rounded focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Nama Kepala Sekolah <span class="text-red-500">*</span></label>
                    <input type="text" id="namaKepsek" required class="w-full p-2 border border-gold rounded focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">NIP Kepala Sekolah <span class="text-red-5
