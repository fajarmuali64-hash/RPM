<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Rencana Pelaksanaan Pembelajaran (RPP/RPM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styling tambahan untuk elemen interaktif dan cetak */
        .dimensi-btn.active {
            background-color: #2563eb; /* bg-blue-600 */
            color: white;
            border-color: #2563eb;
        }

        #outputArea { 
            display: none; 
        }

        /* Konfigurasi CSS khusus untuk pencetakan (window.print) */
        @media print {
            body * {
                visibility: hidden;
            }
            #outputArea, #outputArea * {
                visibility: visible;
            }
            #outputArea {
                display: block;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .no-print {
                display: none !important;
            }
            /* Memastikan warna background tercetak jika browser mengizinkan */
            -webkit-print-color-adjust: exact;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans p-4 md:p-8">

    <div id="formContainer" class="max-w-4xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-md border border-slate-200 no-print">
        <div class="mb-8 border-b pb-4">
            <p class="text-sm uppercase tracking-wider text-blue-600 font-bold mb-1">Formulir Generator</p>
            <h1 class="text-3xl font-bold text-slate-900">Penyusun Dokumen RPP / RPM</h1>
            <p class="text-slate-500 text-sm mt-2">Lengkapi data di bawah ini untuk membuat Rencana Pembelajaran secara otomatis.</p>
        </div>

        <form id="rppForm" onsubmit="generateDokumen(event)">
            
            <h2 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
                <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-sm">1</span> Identitas Sekolah
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Nama Satuan Pendidikan <span class="text-red-500">*</span></label>
                    <input type="text" id="satuanPendidikan" required placeholder="Contoh: SMP Negeri 1 Jakarta" class="w-full p-2.5 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Mata Pelajaran <span class="text-red-500">*</span></label>
                    <input type="text" id="mataPelajaran" required placeholder="Contoh: Bahasa Indonesia" class="w-full p-2.5 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Jenjang Pendidikan <span class="text-red-500">*</span></label>
                    <select id="jenjang" required class="w-full p-2.5 border border-slate-300 rounded bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">-- Pilih Jenjang --</option>
                        <option value="PAUD/TK">PAUD / TK</option>
                        <option value="SD/MI">SD / MI</option>
                        <option value="SMP/MTs">SMP / MTs</option>
                        <option value="SMA/SMK">SMA / MA / SMK</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Kelas <span class="text-red-500">*</span></label>
                    <input type="text" id="kelas" required placeholder="Contoh: VII" class="w-full p-2.5 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-
